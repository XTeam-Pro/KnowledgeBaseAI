version: '3.8'

# KnowledgeBaseAI Stage Environment
# Domains format: kb-<service>.stage.studyninja.ru
# Requires: External Traefik (docker-compose.traefik.yml in /root/)

name: knowledgebase

services:
  frontend:
    platform: linux/amd64
    env_file:
      - ${ENV_FILE:-.env.prod}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # Frontend HTTP (redirect to HTTPS)
      - "traefik.http.routers.kb-frontend-http.rule=Host(`kb-frontend.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-frontend-http.entrypoints=web"
      - "traefik.http.routers.kb-frontend-http.middlewares=https-redirect"

      # Frontend HTTPS
      - "traefik.http.routers.kb-frontend-https.rule=Host(`kb-frontend.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-frontend-https.entrypoints=websecure"
      - "traefik.http.routers.kb-frontend-https.service=kb-frontend"
      - "traefik.http.routers.kb-frontend-https.tls=true"
      - "traefik.http.routers.kb-frontend-https.tls.certresolver=le"

      # Service configuration
      - "traefik.http.services.kb-frontend.loadbalancer.server.port=80"

      # Middleware
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

  fastapi:
    platform: linux/amd64
    env_file:
      - ${ENV_FILE:-.env.prod}
    build:
      context: ./backend
      dockerfile: Dockerfile.fastapi
    restart: unless-stopped
    environment:
      PG_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KB_NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      DB_WAIT_TIMEOUT: 60
      DB_WAIT_INTERVAL: 2
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_started
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # FastAPI HTTP (redirect to HTTPS)
      - "traefik.http.routers.kb-fastapi-http.rule=Host(`kb-fastapi.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-fastapi-http.entrypoints=web"
      - "traefik.http.routers.kb-fastapi-http.middlewares=https-redirect"

      # FastAPI HTTPS
      - "traefik.http.routers.kb-fastapi-https.rule=Host(`kb-fastapi.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-fastapi-https.entrypoints=websecure"
      - "traefik.http.routers.kb-fastapi-https.service=kb-fastapi"
      - "traefik.http.routers.kb-fastapi-https.tls=true"
      - "traefik.http.routers.kb-fastapi-https.tls.certresolver=le"

      # Service configuration
      - "traefik.http.services.kb-fastapi.loadbalancer.server.port=8000"

  redis:
    platform: linux/amd64
    env_file:
      - ${ENV_FILE:-.env.prod}
    image: redis:7-bookworm
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - default
    labels:
      - "traefik.enable=false"

  prometheus:
    user: "0"
    platform: linux/amd64
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # Prometheus HTTP (redirect to HTTPS)
      - "traefik.http.routers.kb-prometheus-http.rule=Host(`kb-prometheus.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-prometheus-http.entrypoints=web"
      - "traefik.http.routers.kb-prometheus-http.middlewares=https-redirect"

      # Prometheus HTTPS
      - "traefik.http.routers.kb-prometheus-https.rule=Host(`kb-prometheus.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-prometheus-https.entrypoints=websecure"
      - "traefik.http.routers.kb-prometheus-https.service=kb-prometheus"
      - "traefik.http.routers.kb-prometheus-https.tls=true"
      - "traefik.http.routers.kb-prometheus-https.tls.certresolver=le"
      - "traefik.http.routers.kb-prometheus-https.middlewares=admin-auth@docker"

      # Service configuration
      - "traefik.http.services.kb-prometheus.loadbalancer.server.port=9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver

  grafana:
    platform: linux/amd64
    image: grafana/grafana:10.4.2-ubuntu
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # Grafana HTTP (redirect to HTTPS)
      - "traefik.http.routers.kb-grafana-http.rule=Host(`kb-grafana.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-grafana-http.entrypoints=web"
      - "traefik.http.routers.kb-grafana-http.middlewares=https-redirect"

      # Grafana HTTPS
      - "traefik.http.routers.kb-grafana-https.rule=Host(`kb-grafana.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-grafana-https.entrypoints=websecure"
      - "traefik.http.routers.kb-grafana-https.service=kb-grafana"
      - "traefik.http.routers.kb-grafana-https.tls=true"
      - "traefik.http.routers.kb-grafana-https.tls.certresolver=le"
      - "traefik.http.routers.kb-grafana-https.middlewares=admin-auth@docker"

      # Service configuration
      - "traefik.http.services.kb-grafana.loadbalancer.server.port=3000"

  neo4j:
    platform: linux/amd64
    image: neo4j:5.26
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_server_bolt_tls__level: DISABLED
      NEO4J_server_memory_pagecache_size: 2G
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    ports:
      - "7474:7474"
    volumes:
      - ./data/neo4j:/data
      - ./data/neo4j_logs:/logs
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # Neo4j Browser HTTP (redirect to HTTPS)
      - "traefik.http.routers.kb-neo4j-http.rule=Host(`kb-neo4j.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-neo4j-http.entrypoints=web"
      - "traefik.http.routers.kb-neo4j-http.middlewares=https-redirect"

      # Neo4j Browser HTTPS
      - "traefik.http.routers.kb-neo4j-https.rule=Host(`kb-neo4j.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-neo4j-https.entrypoints=websecure"
      - "traefik.http.routers.kb-neo4j-https.service=kb-neo4j"
      - "traefik.http.routers.kb-neo4j-https.tls=true"
      - "traefik.http.routers.kb-neo4j-https.tls.certresolver=le"
      - "traefik.http.routers.kb-neo4j-https.middlewares=admin-auth@docker"

      # HTTP Service configuration
      - "traefik.http.services.kb-neo4j.loadbalancer.server.port=7474"

      # TCP/Bolt configuration
      - "traefik.tcp.services.kb-neo4j-bolt.loadbalancer.server.port=7687"
      - "traefik.tcp.routers.kb-neo4j-bolt.rule=HostSNI(`kb-neo4j.stage.studyninja.ru`)"
      - "traefik.tcp.routers.kb-neo4j-bolt.entrypoints=bolt"
      - "traefik.tcp.routers.kb-neo4j-bolt.service=kb-neo4j-bolt"
      - "traefik.tcp.routers.kb-neo4j-bolt.tls=true"
      - "traefik.tcp.routers.kb-neo4j-bolt.tls.certresolver=le"

  postgres:
    platform: linux/amd64
    env_file:
      - ${ENV_FILE:-.env.prod}
    image: postgres:15-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - default
    labels:
      - "traefik.enable=false"

  qdrant:
    platform: linux/amd64
    env_file:
      - ${ENV_FILE:-.env.prod}
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # Qdrant HTTP (redirect to HTTPS)
      - "traefik.http.routers.kb-qdrant-http.rule=Host(`kb-qdrant.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-qdrant-http.entrypoints=web"
      - "traefik.http.routers.kb-qdrant-http.middlewares=https-redirect"

      # Qdrant HTTPS
      - "traefik.http.routers.kb-qdrant-https.rule=Host(`kb-qdrant.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-qdrant-https.entrypoints=websecure"
      - "traefik.http.routers.kb-qdrant-https.service=kb-qdrant"
      - "traefik.http.routers.kb-qdrant-https.tls=true"
      - "traefik.http.routers.kb-qdrant-https.tls.certresolver=le"
      - "traefik.http.routers.kb-qdrant-https.middlewares=admin-auth@docker"

      # Service configuration
      - "traefik.http.services.kb-qdrant.loadbalancer.server.port=6333"

  adminer:
    platform: linux/amd64
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # Adminer HTTP (redirect to HTTPS)
      - "traefik.http.routers.kb-adminer-http.rule=Host(`kb-adminer.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-adminer-http.entrypoints=web"
      - "traefik.http.routers.kb-adminer-http.middlewares=https-redirect"

      # Adminer HTTPS
      - "traefik.http.routers.kb-adminer-https.rule=Host(`kb-adminer.stage.studyninja.ru`)"
      - "traefik.http.routers.kb-adminer-https.entrypoints=websecure"
      - "traefik.http.routers.kb-adminer-https.service=kb-adminer"
      - "traefik.http.routers.kb-adminer-https.tls=true"
      - "traefik.http.routers.kb-adminer-https.tls.certresolver=le"
      - "traefik.http.routers.kb-adminer-https.middlewares=admin-auth@docker"

      # Service configuration
      - "traefik.http.services.kb-adminer.loadbalancer.server.port=8080"

networks:
  traefik-public:
    external: true
  default:
    name: knowledgebase_default
    driver: bridge
